name: Build innoextract

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            git
            make
            cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-xz

      - name: Configure
        run: |
          cmake -B build \
            -G "MinGW Makefiles"

      - name: Build
        run: |
          cmake --build build --parallel

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: innoextract
          path: |
            build/**/*.exe
