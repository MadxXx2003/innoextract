name: Build innoextract

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-xz

      - name: Debug toolchain
        run: |
          echo "MSYSTEM=$MSYSTEM"
          which gcc
          which g++
          which cmake
          which ninja
          gcc --version
          cmake --version

      - name: Configure (force C++17 + Boost debug)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            -DCMAKE_CXX_EXTENSIONS=OFF \
            -DBoost_DEBUG=ON \
            -DBoost_DETAILED_FAILURE_MSG=ON \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF

      - name: Dump CMake Boost detection info
        run: |
          echo "---- CMakeCache Boost entries ----"
          grep -i boost build/CMakeCache.txt || true

      - name: Build
        run: |
          cmake --build build --parallel
          
      - name: Package runtime
        shell: msys2 {0}
        run: |
            mkdir -p dist

            # program
            cp build/innoextract.exe dist/

            # runtime DLLs required by MinGW builds
            for dll in \
              libwinpthread-1.dll \
              libstdc++-6.dll \
              libgcc_s_seh-1.dll \
              libbz2-1.dll \
              libz-1.dll; do
                cp /mingw64/bin/$dll dist/ 2>/dev/null || true
            done
                
      - uses: actions/upload-artifact@v4
        with:
            name: innoextract
            path: dist/
